kind = "web"
previewPath = "/"
title = "Plotzy — Write Your Story"
version = "1.0.0"
id = "artifacts/plotzy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23634

[services.development]
run = "pnpm --filter @workspace/plotzy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/plotzy", "run", "build" ]
publicDir = "artifacts/plotzy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23634"
BASE_PATH = "/"
