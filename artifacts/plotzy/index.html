<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Plotzy is a professional book writing platform with AI-assisted tools, audiobook studio, cover designer, and a community library." />

    <!-- Static canonical fallback for non-JS crawlers (Twitter, FB,
         LinkedIn, Slack). JS-capable crawlers (Googlebot, Bingbot)
         see the per-page canonical emitted by react-helmet-async via
         the <SEO> component. The proper non-JS fix is build-time
         prerender (Path B in discovered-issues.md). -->
    <link rel="canonical" href="https://plotzy.com" />

    <!-- Open Graph / Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Plotzy — Write Your Story" />
    <meta property="og:description" content="A professional book writing platform with AI tools, cover designer, audiobook studio, and a community library for readers." />
    <meta property="og:image" content="/opengraph.jpg" />
    <meta property="og:url" content="https://plotzy.com" />
    <meta property="og:site_name" content="Plotzy" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Plotzy — Write Your Story" />
    <meta name="twitter:description" content="A professional book writing platform with AI tools, cover designer, and a community library." />
    <meta name="twitter:image" content="/opengraph.jpg" />

    <link rel="apple-touch-icon" href="/favicon.png" />
    <title>Plotzy — Write Your Story</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Core UI fonts only — loaded immediately -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Cairo:wght@200..1000&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
